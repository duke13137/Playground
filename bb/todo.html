<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>htmx Todos - Babashka</title>
    <link
      href="https://unpkg.com/todomvc-app-css@2.4.1/index.css"
      rel="stylesheet"
    />
    <script defer src="https://cdn.jsdelivr.net/npm/htmx.org@next"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/scittle@0.8.31/dist/scittle.js"
      type="application/javascript"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/scittle@0.8.31/dist/scittle.js-interop.js"
      type="application/javascript"
    ></script>
    <script>
      var SCITTLE_NREPL_WEBSOCKET_PORT = 3340;
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/scittle@0.8.31/dist/scittle.nrepl.js"
      type="application/javascript"
    ></script>
    <style>
      @keyframes duplicate-flash {
        0% {
          background: rgba(255, 208, 0, 0.45);
        }

        100% {
          background: transparent;
        }
      }

      .todo-list li.duplicate-flash {
        animation: duplicate-flash 0.9s ease;
      }
    </style>
  </head>
  <body>
    <section class="todoapp">
      <header class="header">
        <h1>todos</h1>
        <form
          id="add-form"
          hx-post="/todos"
          hx-target="#add-form"
          hx-swap="outerHTML"
          hx-include="#todo-list-form input[name='filter']"
        >
          <input
            id="todo-input"
            class="new-todo"
            type="text"
            aria-label="New todo"
            name="title"
            placeholder="What needs to be done?"
            autocomplete="off"
            required
            autofocus
            hx-get="/todos/list"
            hx-trigger="input changed delay:500ms"
            hx-include="#todo-list-form input[name='filter']"
            hx-target="#todo-list"
            hx-swap="outerMorph"
            hx-sync="closest form:abort"
          />
        </form>
      </header>

      {{initial-list|safe}}
    </section>
    <footer class="info">
      <p>Double-click to edit, Enter to add</p>
    </footer>
  </body>
</html>
